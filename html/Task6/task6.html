<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LabTask6-1</title>

  <style>
   
  </style>
  <link rel="stylesheet" href="/html/Task6/style.css" />
</head>

<body>
  <div class="container">


    <div class="box">
      <input class="textbox" type="text" placeholder="Name">
      <input class="textbox" type="email" placeholder="Email">

      <div class="survey">
        <p class="survey-text">
          Thanks for chatting with our customer support. Would you like to take our quick survey?
        </p>
        <div class="survey-buttons">
          <button type="button">Yes</button>
          <button type="button">No</button>
        </div>
      </div>

      <div class="google">
        <img src="/picture/Google_2015_logo.svg.png" alt="Google">
        <form action="https://www.google.com/search" method="GET">
          <input type="text" name="q" placeholder="Search Google or type a URL">
        </form>
      </div>
    </div>

    <!-- Challenge Exercises -->
    <div class="challenge">
      <h2 class="challenge-title">Challenge Exercises</h2>

      <div class="challenge-cols">

        <!-- 8d Sign up -->
        <div class="col">
          <div class="signup-card">
            <input type="text" placeholder="First name">
            <input type="text" placeholder="Last name">
            <input type="email" placeholder="Email">
            <button class="signup-btn" type="button">Sign Up</button>
          </div>
        </div>

        <!-- 8e Uber -->
        <div class="col">
          <div class="uber-card">
            <h3 class="uber-title">Request a ride now</h3>
            <input type="text" placeholder="Enter pickup location">
            <input type="text" placeholder="Enter destination">
            <div class="uber-actions">
              <button class="btn-black" type="button">Request now</button>
              <button class="btn-gray" type="button">Schedule for later</button>
            </div>
          </div>
        </div>

      </div>
    </div>

  </div>
</body>
</html>
