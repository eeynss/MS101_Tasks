<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Form</title>

<style>
legend {
    color: blue;
}
</style>

</head>

<body>

<form action="z" method="post">

<fieldset style="width:500px; padding:15px;">
<legend>Request for Proposal</legend>

<table>

<tr>
<td><label for="name">Your name:</label></td>
<td><input type="text" id="name" name="name"></td>
</tr>

<tr>
<td><label for="email">Email:</label></td>
<td><input type="email" id="email" name="email"></td>
</tr>

<tr>
<td><label for="username">Username:</label></td>
<td><input type="text" id="username" name="username"></td>
</tr>

<tr>
<td><label for="password">Password:</label></td>
<td><input type="password" id="password" name="password"></td>
</tr>

<tr>
<td><label for="business">Your Business:</label></td>
<td>
<textarea id="business" rows="8" cols="27"
placeholder="Briefly describe your business in this space"></textarea>
</td>
</tr>

<tr>
<td style="vertical-align: top; padding-top: 3px;"><label>Company size:</label></td>

<td>
<input type="radio" id="than10" name="company_size" value="less_10">
<label for="than10">Less than 10</label><br>

<input type="radio" id="11to50" name="company_size" value="11_50">
<label for="11to50">11 to 50</label><br>

<input type="radio" id="50to200" name="company_size" value="50_200">
<label for="50to200">50 to 200</label><br>

<input type="radio" id="over200" name="company_size" value="over_200">
<label for="over200">Over 200</label><br>

</td>
</tr>

<tr>
<td><label>Service:</label></td>
<td>

<input type="checkbox" id="brand" name="service" value="Brand Identity">
<label for="brand">Brand Identity</label>

<input type="checkbox" id="website" name="service" value="New Website">
<label for="website">New Website</label>

<input type="checkbox" id="redisigner" name="service" value="Web Redesign">
<label for="redisigner">Web Redisigner</label>

</td>
</tr>

<tr>
<td><label for="timeline">Timeline:</label></td>
<td>

<select id="timeline" name="timeline">
<option value="immediately">Immediately</option>
<option value="1_2_months">1–2 Weeks</option>
<option value="3_6_weeks">3–6 Weeks</option>
<option value="7_2_months">7–2 Months</option>
</select>

</td>
</tr>

<tr>
<td></td>
<td>
<button type="submit">Send to dev/design</button>
</td>
</tr>


</table>

</fieldset>
</form>

<a href="https://github.com/eeynss/MS101_Tasks/blob/main/Task%204%20-%20HTML%20Form/code.png">View Source Code</a>

</body>
</html>
